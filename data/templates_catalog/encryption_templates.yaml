# ============================================================
# Encryption Fix Templates
# Maps to rules: ENC-001 to ENC-005
# ============================================================

templates:

  - id: ENC-FIX-001
    name: "Replace Weak Encryption Algorithm"
    category: encryption
    applies_to:
      - ENC-001

    fix_strategy: configuration_change

    fix_template: "{{original_key}}=AES-256-GCM"

    variables:
      - name: original_key
        type: string
        description: "The encryption algorithm config key"

    explanation: >
      The weak or deprecated encryption algorithm (MD5, SHA1, DES, RC4, 3DES) has been
      replaced with AES-256-GCM, which is the current industry standard for symmetric
      encryption. AES-256-GCM provides both confidentiality and integrity.

    metadata:
      auto_fixable: true
      fix_confidence: 0.85
      priority: high
      effort: medium

    side_effects:
      - "Changing the encryption algorithm requires re-encrypting any existing encrypted data."
      - "Ensure all application code that performs encryption/decryption is updated to match."

    breaking_change: true

    validation:
      - type: regex
        pattern: 'AES'
        description: "Must use AES-based algorithm"

    test_cases:
      - input:
          original_key: "ENCRYPTION_ALGORITHM"
          original_value: "MD5"
        expected_output: "ENCRYPTION_ALGORITHM=AES-256-GCM"

  - id: ENC-FIX-002
    name: "Enable TLS Certificate Verification"
    category: encryption
    applies_to:
      - ENC-002

    fix_strategy: configuration_change

    fix_template: "{{original_key}}=true"

    variables:
      - name: original_key
        type: string
        description: "The TLS verification config key"

    explanation: >
      TLS certificate verification has been re-enabled. Disabling verification (SSL_VERIFY=false)
      exposes your application to man-in-the-middle attacks. If you were disabling this to work
      with self-signed certificates in development, use a proper CA or add the certificate to
      your trust store instead.

    metadata:
      auto_fixable: true
      fix_confidence: 0.90
      priority: high
      effort: low

    side_effects:
      - "If using self-signed certificates, add them to your CA bundle instead of disabling verification."

    breaking_change: false

    validation:
      - type: regex
        pattern: '=true'
        description: "TLS verification must be enabled (true)"

    test_cases:
      - input:
          original_key: "SSL_VERIFY"
          original_value: "false"
        expected_output: "SSL_VERIFY=true"

  - id: ENC-FIX-003
    name: "Enforce Minimum TLS Version"
    category: encryption
    applies_to:
      - ENC-003

    fix_strategy: configuration_change

    fix_template: "{{original_key}}=TLSv1.3"

    variables:
      - name: original_key
        type: string
        description: "The TLS version config key"

    explanation: >
      The TLS version has been updated to TLSv1.3, the current recommended minimum.
      TLSv1.0 and TLSv1.1 are deprecated and have known vulnerabilities (BEAST, POODLE).
      TLSv1.2 is acceptable but TLSv1.3 offers improved security and performance.

    metadata:
      auto_fixable: true
      fix_confidence: 0.85
      priority: high
      effort: low

    side_effects:
      - "Older clients that don't support TLSv1.3 will be unable to connect."
      - "Test with all expected client types before deploying to production."

    breaking_change: true

    validation:
      - type: regex
        pattern: 'TLSv1\.[23]'
        description: "Must use TLSv1.2 or higher"

    test_cases:
      - input:
          original_key: "TLS_VERSION"
          original_value: "TLSv1.0"
        expected_output: "TLS_VERSION=TLSv1.3"

  - id: ENC-FIX-004
    name: "Remove Hard-coded Encryption Key"
    category: encryption
    applies_to:
      - ENC-004

    fix_strategy: template_replacement

    fix_template: "{{original_key}}=${{{original_key}}}"

    variables:
      - name: original_key
        type: string
        description: "The encryption key config name"

    explanation: >
      The hard-coded encryption key has been replaced with an environment variable reference.
      Encryption keys must never be stored in source code or configuration files committed to
      version control. Use a key management service (AWS KMS, HashiCorp Vault, Azure Key Vault)
      to manage cryptographic keys securely.

    metadata:
      auto_fixable: true
      fix_confidence: 0.95
      priority: immediate
      effort: low

    side_effects:
      - "Existing encrypted data cannot be decrypted after key rotation without migration."
      - "Plan a key rotation strategy before implementing."

    breaking_change: true

    validation:
      - type: regex
        pattern: '=\$\{'
        description: "Must use environment variable reference"

    test_cases:
      - input:
          original_key: "ENCRYPTION_KEY"
          original_value: "mysecretkey12345"
        expected_output: "ENCRYPTION_KEY=${ENCRYPTION_KEY}"

  - id: ENC-FIX-005
    name: "Enable HTTPS / Enforce Secure Transport"
    category: encryption
    applies_to:
      - ENC-005

    fix_strategy: configuration_change

    fix_template: "{{original_key}}=https"

    variables:
      - name: original_key
        type: string
        description: "The protocol or scheme config key"

    explanation: >
      The insecure HTTP protocol has been replaced with HTTPS. All production traffic
      should be encrypted in transit. Configure an SSL/TLS certificate (e.g. via Let's Encrypt)
      and enable HTTPS redirects to prevent plain-text data transmission.

    metadata:
      auto_fixable: true
      fix_confidence: 0.80
      priority: high
      effort: medium

    side_effects:
      - "Requires a valid SSL/TLS certificate configured on the server."
      - "Update any hard-coded URLs in your application from http:// to https://."

    breaking_change: false

    validation:
      - type: regex
        pattern: 'https'
        description: "Must use HTTPS"

    test_cases:
      - input:
          original_key: "APP_PROTOCOL"
          original_value: "http"
        expected_output: "APP_PROTOCOL=https"
