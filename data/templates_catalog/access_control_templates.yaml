# ============================================================
# Access Control Fix Templates
# Maps to rules: AC-001 to AC-005
# ============================================================

templates:

  - id: AC-FIX-001
    name: "Restrict CORS Origins"
    category: access_control
    applies_to:
      - AC-001

    fix_strategy: configuration_change

    fix_template: "{{original_key}}=${{{original_key}_ORIGINS}}"

    variables:
      - name: original_key
        type: string
        description: "The CORS origins config key"

    explanation: >
      The wildcard CORS origin (*) has been replaced with an environment variable
      reference for specific allowed origins. In production, always specify exact
      domains (e.g. https://app.example.com) rather than allowing all origins.
      This prevents cross-origin attacks from malicious websites.

    metadata:
      auto_fixable: false
      fix_confidence: 0.80
      priority: high
      effort: medium

    side_effects:
      - "You must set the CORS_ORIGINS variable to a comma-separated list of allowed domains."
      - "Test all legitimate frontend origins are included."

    breaking_change: true

    validation:
      - type: regex
        pattern: '=\$\{'
        description: "Must use environment variable reference for origins"

    test_cases:
      - input:
          original_key: "CORS_ORIGINS"
          original_value: "*"
        expected_output: "CORS_ORIGINS=${CORS_ORIGINS_ORIGINS}"

  - id: AC-FIX-002
    name: "Restrict Allowed Hosts"
    category: access_control
    applies_to:
      - AC-002

    fix_strategy: template_replacement

    fix_template: "{{original_key}}=${{{original_key}}}"

    variables:
      - name: original_key
        type: string
        description: "The allowed hosts config key"

    explanation: >
      The unrestricted allowed hosts setting has been replaced with an environment
      variable reference. Set ALLOWED_HOSTS to a comma-separated list of your
      specific domain names (e.g. example.com,www.example.com).
      Unrestricted host settings are vulnerable to HTTP Host header attacks.

    metadata:
      auto_fixable: true
      fix_confidence: 0.85
      priority: high
      effort: low

    side_effects:
      - "Ensure all legitimate hostnames are included in the ALLOWED_HOSTS variable."

    breaking_change: false

    validation:
      - type: regex
        pattern: '=\$\{'
        description: "Must use environment variable reference"

    test_cases:
      - input:
          original_key: "ALLOWED_HOSTS"
          original_value: "*"
        expected_output: "ALLOWED_HOSTS=${ALLOWED_HOSTS}"

  - id: AC-FIX-003
    name: "Restrict File Permissions"
    category: access_control
    applies_to:
      - AC-003

    fix_strategy: configuration_change

    fix_template: "{{original_key}}=0644"

    variables:
      - name: original_key
        type: string
        description: "The file permissions config key"

    explanation: >
      World-writable permissions (0777) have been replaced with secure permissions (0644
      for files, 0755 for directories). World-writable files allow any user on the system
      to modify them, which can lead to privilege escalation or data tampering.

    metadata:
      auto_fixable: true
      fix_confidence: 0.90
      priority: high
      effort: low

    side_effects:
      - "Verify that no application processes require write access that would be removed."

    breaking_change: false

    validation:
      - type: regex
        pattern: '0[4-7][0-4][0-4]'
        description: "Must use restrictive permission mask"

    test_cases:
      - input:
          original_key: "FILE_MODE"
          original_value: "0777"
        expected_output: "FILE_MODE=0644"

  - id: AC-FIX-004
    name: "Replace Default Admin Credentials"
    category: access_control
    applies_to:
      - AC-004

    fix_strategy: template_replacement

    fix_template: "{{original_key}}=${{{original_key}}}"

    variables:
      - name: original_key
        type: string
        description: "The admin credential config key"

    explanation: >
      Default or weak admin credentials have been replaced with an environment variable
      reference. Default credentials (admin/admin, root/password) are the first thing
      attackers try. Generate a strong random password and store it in your secrets manager.
      Never use default credentials in any environment.

    metadata:
      auto_fixable: true
      fix_confidence: 0.95
      priority: immediate
      effort: low

    side_effects:
      - "Update all team members who may know the current default credentials."
      - "Check if default credentials exist in any database or service configurations."

    breaking_change: false

    validation:
      - type: regex
        pattern: '=\$\{'
        description: "Must use environment variable reference"

    test_cases:
      - input:
          original_key: "ADMIN_PASSWORD"
          original_value: "admin"
        expected_output: "ADMIN_PASSWORD=${ADMIN_PASSWORD}"

  - id: AC-FIX-005
    name: "Secure Session Configuration"
    category: access_control
    applies_to:
      - AC-005

    fix_strategy: configuration_change

    fix_template: "{{original_key}}=true"

    variables:
      - name: original_key
        type: string
        description: "The session security config key (e.g. SESSION_COOKIE_SECURE)"

    explanation: >
      Session security flags (HttpOnly, Secure, SameSite) have been enabled.
      These flags protect session cookies from XSS attacks (HttpOnly prevents
      JavaScript access), transmission over HTTP (Secure requires HTTPS), and
      CSRF attacks (SameSite=Strict or Lax).

    metadata:
      auto_fixable: true
      fix_confidence: 0.85
      priority: high
      effort: low

    side_effects:
      - "SESSION_COOKIE_SECURE=true requires HTTPS to be configured."
      - "Users with existing insecure sessions will need to re-authenticate."

    breaking_change: false

    validation:
      - type: regex
        pattern: '=true'
        description: "Security flag must be enabled"

    test_cases:
      - input:
          original_key: "SESSION_COOKIE_SECURE"
          original_value: "false"
        expected_output: "SESSION_COOKIE_SECURE=true"
