# ============================================================
# Logging Fix Templates
# Maps to rules: LOG-001 to LOG-003
# ============================================================

templates:

  - id: LOG-FIX-001
    name: "Enable Application Logging"
    category: logging
    applies_to:
      - LOG-001

    fix_strategy: configuration_change

    fix_template: "{{original_key}}=INFO"

    variables:
      - name: original_key
        type: string
        description: "The log level or logging enabled config key"

    explanation: >
      Logging has been enabled at INFO level. Without logs, security incidents
      cannot be detected, investigated, or audited — a requirement of NIST CSF
      (DE.CM-7) and compliance frameworks like SOC 2 and ISO 27001.
      Use DEBUG level only in development; INFO or WARNING in production.

    metadata:
      auto_fixable: true
      fix_confidence: 0.90
      priority: medium
      effort: low

    side_effects:
      - "Ensure log storage is configured and log rotation is enabled."
      - "Logs may contain operational information — configure appropriate access controls."

    breaking_change: false

    validation:
      - type: regex
        pattern: '(INFO|WARNING|ERROR|DEBUG)'
        description: "Log level must be a valid level (not disabled/off/none)"

    test_cases:
      - input:
          original_key: "LOG_LEVEL"
          original_value: "none"
        expected_output: "LOG_LEVEL=INFO"
      - input:
          original_key: "LOGGING_ENABLED"
          original_value: "false"
        expected_output: "LOGGING_ENABLED=INFO"

  - id: LOG-FIX-002
    name: "Disable Sensitive Data Logging"
    category: logging
    applies_to:
      - LOG-002

    fix_strategy: configuration_change

    fix_template: "{{original_key}}=false"

    variables:
      - name: original_key
        type: string
        description: "The log sensitive data config key"

    explanation: >
      Logging of sensitive data (passwords, tokens, PII) has been disabled.
      Sensitive data in logs creates compliance violations (GDPR, PCI-DSS) and
      security risks if logs are accessed by unauthorised parties or leaked.
      Implement log sanitisation to mask or exclude sensitive fields.

    metadata:
      auto_fixable: true
      fix_confidence: 0.95
      priority: high
      effort: low

    side_effects:
      - "Review your logging code to ensure sensitive fields are explicitly excluded."
      - "Implement a log sanitisation middleware if not already in place."

    breaking_change: false

    validation:
      - type: regex
        pattern: '=false'
        description: "Sensitive data logging must be disabled"

    test_cases:
      - input:
          original_key: "LOG_PASSWORDS"
          original_value: "true"
        expected_output: "LOG_PASSWORDS=false"

  - id: LOG-FIX-003
    name: "Configure Centralised Log Destination"
    category: logging
    applies_to:
      - LOG-003

    fix_strategy: template_replacement

    fix_template: "{{original_key}}=${{{original_key}}}"

    variables:
      - name: original_key
        type: string
        description: "The log destination config key"

    explanation: >
      The log destination has been replaced with an environment variable reference.
      Centralised logging (e.g. ELK Stack, Splunk, CloudWatch) provides security
      monitoring, alerting, and audit trails. Never log to /dev/null in production —
      this silently discards all events and prevents incident detection.

    metadata:
      auto_fixable: true
      fix_confidence: 0.85
      priority: medium
      effort: medium

    side_effects:
      - "Configure the LOG_DESTINATION variable to point to your logging infrastructure."

    breaking_change: false

    validation:
      - type: regex
        pattern: '=\$\{'
        description: "Must use environment variable reference for log destination"

    test_cases:
      - input:
          original_key: "LOG_DESTINATION"
          original_value: "/dev/null"
        expected_output: "LOG_DESTINATION=${LOG_DESTINATION}"


