templates:

  - id: CRED-FIX-001
    name: "Hard-coded Password Removal"
    category: credentials
    applies_to:
      - CRED-001
    fix_strategy: template_replacement
    description: "Replace hard-coded password with environment variable reference"
    fix_template: "{original_key}=${{{env_var_name}}}"
    variables:
      - name: env_var_name
        type: string
        default: "{original_key}"
        description: "Name of the environment variable to reference"
    explanation: |
      Hard-coded passwords expose credentials directly in configuration files.
      Replace the value with an environment variable reference so the actual
      secret is stored outside the codebase and injected at runtime.
    metadata:
      auto_fixable: true
      fix_confidence: 0.95
      priority: immediate
      effort: low
    side_effects:
      - "Ensure the environment variable is set in all deployment environments"
      - "Update CI/CD pipeline secrets configuration"
      - "Notify team members to set the variable in their local .env files"
    breaking_change: false
    validation:
      - type: regex
        pattern: '^\S+=\$\{\S+\}$'
        description: "Value must use environment variable reference format"
    test_cases:
      - input:
          original_key: "DATABASE_PASSWORD"
          original_value: "admin123"
          env_var_name: "DATABASE_PASSWORD"
        expected_output: "DATABASE_PASSWORD=${DATABASE_PASSWORD}"

  - id: CRED-FIX-002
    name: "Hard-coded Username Removal"
    category: credentials
    applies_to:
      - CRED-002
    fix_strategy: template_replacement
    description: "Replace hard-coded username with environment variable reference"
    fix_template: "{original_key}=${{{env_var_name}}}"
    variables:
      - name: env_var_name
        type: string
        default: "{original_key}"
        description: "Name of the environment variable to reference"
    explanation: |
      Hard-coded usernames expose account identifiers in configuration files.
      Replace with an environment variable so the value can be managed securely
      and changed without modifying the codebase.
    metadata:
      auto_fixable: true
      fix_confidence: 0.90
      priority: high
      effort: low
    side_effects:
      - "Set the environment variable in all deployment environments"
      - "Update documentation to inform team of the new variable"
    breaking_change: false
    validation:
      - type: regex
        pattern: '^\S+=\$\{\S+\}$'
        description: "Value must use environment variable reference format"
    test_cases:
      - input:
          original_key: "DB_USERNAME"
          original_value: "admin"
          env_var_name: "DB_USERNAME"
        expected_output: "DB_USERNAME=${DB_USERNAME}"

  - id: CRED-FIX-003
    name: "API Key Removal"
    category: credentials
    applies_to:
      - CRED-003
    fix_strategy: template_replacement
    description: "Replace hard-coded API key with environment variable reference"
    fix_template: "{original_key}=${{{env_var_name}}}"
    variables:
      - name: env_var_name
        type: string
        default: "{original_key}"
        description: "Name of the environment variable to reference"
    explanation: |
      API keys in configuration files are a critical security risk. If committed
      to version control, they can be exposed publicly. Replace with an
      environment variable and rotate the existing key immediately.
    metadata:
      auto_fixable: true
      fix_confidence: 0.95
      priority: immediate
      effort: low
    side_effects:
      - "Rotate the existing API key immediately after fixing"
      - "Set the new API key as an environment variable in all environments"
      - "Scan git history to ensure old key was never committed"
    breaking_change: false
    validation:
      - type: regex
        pattern: '^\S+=\$\{\S+\}$'
        description: "Value must use environment variable reference format"
    test_cases:
      - input:
          original_key: "API_KEY"
          original_value: "sk-abc123xyz"
          env_var_name: "API_KEY"
        expected_output: "API_KEY=${API_KEY}"

  - id: CRED-FIX-004
    name: "Secret Token Removal"
    category: credentials
    applies_to:
      - CRED-004
    fix_strategy: template_replacement
    description: "Replace hard-coded secret/token with environment variable reference"
    fix_template: "{original_key}=${{{env_var_name}}}"
    variables:
      - name: env_var_name
        type: string
        default: "{original_key}"
        description: "Name of the environment variable to reference"
    explanation: |
      Secret tokens and signing keys must never be stored in plain text within
      configuration files. Replace with an environment variable reference and
      use a secrets management system in production.
    metadata:
      auto_fixable: true
      fix_confidence: 0.95
      priority: immediate
      effort: low
    side_effects:
      - "Regenerate any tokens that may have been exposed"
      - "Consider using a secrets manager such as HashiCorp Vault or AWS Secrets Manager"
    breaking_change: false
    validation:
      - type: regex
        pattern: '^\S+=\$\{\S+\}$'
        description: "Value must use environment variable reference format"
    test_cases:
      - input:
          original_key: "SECRET_KEY"
          original_value: "mysupersecrettoken"
          env_var_name: "SECRET_KEY"
        expected_output: "SECRET_KEY=${SECRET_KEY}"

  - id: CRED-FIX-005
    name: "Default Credential Replacement"
    category: credentials
    applies_to:
      - CRED-005
    fix_strategy: template_replacement
    description: "Replace default/weak credentials with environment variable reference"
    fix_template: "{original_key}=${{{env_var_name}}}"
    variables:
      - name: env_var_name
        type: string
        default: "{original_key}"
        description: "Name of the environment variable to reference"
    explanation: |
      Default credentials such as 'admin', 'password', '123456', or 'root' are
      the first values attackers attempt. Replace with a strong, unique value
      stored as an environment variable.
    metadata:
      auto_fixable: true
      fix_confidence: 0.90
      priority: immediate
      effort: low
    side_effects:
      - "Set a strong, randomly generated value as the environment variable"
      - "Update all services that depend on this credential"
    breaking_change: true
    validation:
      - type: regex
        pattern: '^\S+=\$\{\S+\}$'
        description: "Value must use environment variable reference format"
    test_cases:
      - input:
          original_key: "ADMIN_PASSWORD"
          original_value: "admin"
          env_var_name: "ADMIN_PASSWORD"
        expected_output: "ADMIN_PASSWORD=${ADMIN_PASSWORD}"
