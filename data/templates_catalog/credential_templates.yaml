# ============================================================
# Credential Fix Templates
# Maps to rules: CRED-001 to CRED-005
# ============================================================

templates:

  # ── CRED-FIX-001: Hard-coded Password → Env Var ──────────────────────────
  - id: CRED-FIX-001
    name: "Replace Hard-coded Password with Environment Variable"
    category: credentials
    applies_to:
      - CRED-001

    fix_strategy: template_replacement

    fix_template: "{{original_key}}=${{{original_key}}}"

    variables:
      - name: original_key
        type: string
        description: "The config key name (e.g. DATABASE_PASSWORD)"
      - name: original_value
        type: string
        description: "The current hard-coded value"

    explanation: >
      The hard-coded password has been replaced with an environment variable reference.
      Set the actual value in your deployment environment (e.g. Docker Compose, Kubernetes
      Secret, or a .env file that is NOT committed to version control).
      Never commit real credentials to source control.

    metadata:
      auto_fixable: true
      fix_confidence: 0.95
      priority: immediate
      effort: low

    side_effects:
      - "You must set the environment variable in your runtime environment before deploying."
      - "Ensure the variable is added to your secrets manager (e.g. AWS Secrets Manager, Vault)."

    breaking_change: false

    validation:
      - type: regex
        pattern: '=\$\{'
        description: "Fixed value must use ${VAR} environment variable reference format"

    test_cases:
      - input:
          original_key: "DATABASE_PASSWORD"
          original_value: "admin123"
        expected_output: "DATABASE_PASSWORD=${DATABASE_PASSWORD}"
      - input:
          original_key: "DB_PASS"
          original_value: "supersecret"
        expected_output: "DB_PASS=${DB_PASS}"

  # ── CRED-FIX-002: Exposed API Key → Env Var ──────────────────────────────
  - id: CRED-FIX-002
    name: "Remove Exposed API Key"
    category: credentials
    applies_to:
      - CRED-002

    fix_strategy: template_replacement

    fix_template: "{{original_key}}=${{{original_key}}}"

    variables:
      - name: original_key
        type: string
        description: "The API key config name"
      - name: original_value
        type: string
        description: "The exposed API key value"

    explanation: >
      The hard-coded API key has been replaced with an environment variable reference.
      Additionally, you should immediately rotate the exposed key in your provider's
      dashboard (Stripe, AWS, etc.), as it may already be compromised if this file
      was ever committed to a public repository.

    metadata:
      auto_fixable: true
      fix_confidence: 0.95
      priority: immediate
      effort: low

    side_effects:
      - "Rotate the old API key immediately — it may already be exposed."
      - "Set the new key value in your runtime environment secrets."

    breaking_change: false

    validation:
      - type: regex
        pattern: '=\$\{'
        description: "Must use environment variable reference"

    test_cases:
      - input:
          original_key: "STRIPE_API_KEY"
          original_value: "sk_live_abcdef1234567890"
        expected_output: "STRIPE_API_KEY=${STRIPE_API_KEY}"

  # ── CRED-FIX-003: Hard-coded DB Connection String → Env Var ──────────────
  - id: CRED-FIX-003
    name: "Replace Hard-coded Database Connection String"
    category: credentials
    applies_to:
      - CRED-003

    fix_strategy: template_replacement

    fix_template: "{{original_key}}=${{{original_key}}}"

    variables:
      - name: original_key
        type: string
        description: "The connection string config key"
      - name: original_value
        type: string
        description: "The hard-coded connection string"

    explanation: >
      The hard-coded database connection string (which embeds credentials) has been
      replaced with an environment variable reference. Connection strings should
      always be injected at runtime via environment variables or a secrets manager.
      Consider also splitting into separate DB_HOST, DB_USER, DB_PASSWORD variables
      for finer-grained access control.

    metadata:
      auto_fixable: true
      fix_confidence: 0.90
      priority: immediate
      effort: low

    side_effects:
      - "Ensure DATABASE_URL (or equivalent) is set in all deployment environments."
      - "Update CI/CD pipelines to inject the variable from secrets storage."

    breaking_change: false

    validation:
      - type: regex
        pattern: '=\$\{'
        description: "Must use environment variable reference"

    test_cases:
      - input:
          original_key: "DATABASE_URL"
          original_value: "postgres://admin:secret@db.example.com:5432/mydb"
        expected_output: "DATABASE_URL=${DATABASE_URL}"

  # ── CRED-FIX-004: Weak Secret Key → Strong Random Key ────────────────────
  - id: CRED-FIX-004
    name: "Replace Weak Secret Key with Environment Variable"
    category: credentials
    applies_to:
      - CRED-004

    fix_strategy: template_replacement

    fix_template: "{{original_key}}=${{{original_key}}}  # generate: python -c \"import secrets; print(secrets.token_hex(32))\""

    variables:
      - name: original_key
        type: string
        description: "The secret key config name"
      - name: original_value
        type: string
        description: "The current weak value"

    explanation: >
      The weak/default secret key has been replaced with an environment variable reference.
      Generate a strong random key using Python's secrets module:
        python -c "import secrets; print(secrets.token_hex(32))"
      Store this in your secrets manager and never commit the actual value.

    metadata:
      auto_fixable: true
      fix_confidence: 0.90
      priority: immediate
      effort: low

    side_effects:
      - "Changing the secret key will invalidate existing sessions and signed tokens."
      - "Plan a maintenance window if active sessions need to remain valid."

    breaking_change: true

    validation:
      - type: regex
        pattern: '=\$\{'
        description: "Must use environment variable reference"

    test_cases:
      - input:
          original_key: "SECRET_KEY"
          original_value: "mysecret"
        expected_output: 'SECRET_KEY=${SECRET_KEY}  # generate: python -c "import secrets; print(secrets.token_hex(32))"'

  # ── CRED-FIX-005: Hard-coded Token → Env Var ─────────────────────────────
  - id: CRED-FIX-005
    name: "Remove Hard-coded Authentication Token"
    category: credentials
    applies_to:
      - CRED-005

    fix_strategy: template_replacement

    fix_template: "{{original_key}}=${{{original_key}}}"

    variables:
      - name: original_key
        type: string
        description: "The token config key name"
      - name: original_value
        type: string
        description: "The hard-coded token value"

    explanation: >
      The hard-coded authentication token has been replaced with an environment variable
      reference. Tokens (especially long-lived ones) must be stored in a secrets manager.
      If this token was ever committed to version control, revoke it immediately and
      generate a new one.

    metadata:
      auto_fixable: true
      fix_confidence: 0.95
      priority: immediate
      effort: low

    side_effects:
      - "Revoke the old token immediately if it was ever in version control."
      - "Set the new token value in your runtime secrets."

    breaking_change: false

    validation:
      - type: regex
        pattern: '=\$\{'
        description: "Must use environment variable reference"

    test_cases:
      - input:
          original_key: "GITHUB_TOKEN"
          original_value: "ghp_abcdefghijklmnopqrstuvwxyz123456"
        expected_output: "GITHUB_TOKEN=${GITHUB_TOKEN}"
