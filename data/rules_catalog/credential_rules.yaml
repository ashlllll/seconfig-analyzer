# ============================================================
# Credential Security Rules (5 rules)
# Category: credentials
# Rules: CRED-001 to CRED-005
# ============================================================

rules:
  # ────────────────────────────────────────────────────────
  - id: CRED-001
    name: "Hard-coded Password"
    category: credentials
    severity: critical
    cvss_score: 9.1

    description: >
      A plain-text password is directly assigned to a configuration key.
      Hard-coded passwords are easily discovered through source code review
      or version control history and cannot be rotated without code changes.

    detection:
      type: regex
      patterns:
        - '(?i)(password|passwd|pwd)\s*=\s*(?!\$\{)(?!<)[^\s\'\"]{4,}'
        - '(?i)(db_pass|database_pass|db_password)\s*=\s*(?!\$\{)[^\s]{4,}'
      apply_to: ["env", "yaml", "json"]

    exclusions:
      - pattern: '(?i)=\s*\$\{'       # environment variable reference
      - pattern: '(?i)=\s*<[^>]+>'    # placeholder like <YOUR_PASSWORD>
      - pattern: '(?i)=\s*""'         # empty string
      - pattern: '(?i)=\s*\*+'        # masked value

    risk_profile:
      base_severity: 9.1
      exploitability: 0.9
      impact_confidentiality: high
      impact_integrity: high
      impact_availability: low
      likelihood_mean: 0.80
      likelihood_std: 0.10
      distribution_type: beta

    nist_function: PROTECT
    nist_category: PR.AC-1
    cwe_id: CWE-798
    owasp_category: A07:2021

    remediation:
      hint: "Replace the hard-coded password with an environment variable reference."
      template_id: CRED-FIX-001
      example_fix: "DATABASE_PASSWORD=${DATABASE_PASSWORD}"

    references:
      - title: "CWE-798: Use of Hard-coded Credentials"
        url: "https://cwe.mitre.org/data/definitions/798.html"
      - title: "NIST SP 800-53 IA-5"
        url: "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"

    test_cases:
      should_match:
        - "DATABASE_PASSWORD=admin123"
        - "DB_PASS=supersecret"
        - "password=mypassword"
      should_not_match:
        - "DATABASE_PASSWORD=${DB_PASSWORD}"
        - "DATABASE_PASSWORD=<YOUR_PASSWORD_HERE>"
        - "# password=example"

  # ────────────────────────────────────────────────────────
  - id: CRED-002
    name: "Exposed API Key"
    category: credentials
    severity: critical
    cvss_score: 9.0

    description: >
      An API key or secret token is directly embedded in the configuration file.
      Exposed API keys can lead to unauthorised access to third-party services,
      financial charges, and data breaches.

    detection:
      type: regex
      patterns:
        - '(?i)(api_key|apikey|api_secret)\s*=\s*(?!\$\{)(?!<)[a-zA-Z0-9_\-]{16,}'
        - '(?i)(stripe_key|stripe_secret)\s*=\s*sk_(?:live|test)_[a-zA-Z0-9]{24,}'
        - '(?i)(aws_secret|aws_secret_access_key)\s*=\s*(?!\$\{)[A-Za-z0-9/+=]{40}'
      apply_to: ["env", "yaml", "json"]

    exclusions:
      - pattern: '(?i)=\s*\$\{'
      - pattern: '(?i)=\s*<[^>]+>'
      - pattern: '(?i)=\s*your[-_]'

    risk_profile:
      base_severity: 9.0
      exploitability: 0.85
      impact_confidentiality: high
      impact_integrity: high
      impact_availability: medium
      likelihood_mean: 0.75
      likelihood_std: 0.12
      distribution_type: beta

    nist_function: PROTECT
    nist_category: PR.AC-1
    cwe_id: CWE-798
    owasp_category: A07:2021

    remediation:
      hint: "Store API keys in a secrets manager or environment variable, never in config files."
      template_id: CRED-FIX-002
      example_fix: "STRIPE_API_KEY=${STRIPE_API_KEY}"

    references:
      - title: "CWE-798: Use of Hard-coded Credentials"
        url: "https://cwe.mitre.org/data/definitions/798.html"

    test_cases:
      should_match:
        - "STRIPE_API_KEY=sk_live_abcdef1234567890abcdef12"
        - "AWS_SECRET_ACCESS_KEY=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
      should_not_match:
        - "STRIPE_API_KEY=${STRIPE_SECRET}"
        - "API_KEY=<your-api-key>"

  # ────────────────────────────────────────────────────────
  - id: CRED-003
    name: "Hard-coded Database Connection String"
    category: credentials
    severity: high
    cvss_score: 8.2

    description: >
      A database connection string containing credentials is hard-coded
      in the configuration. This exposes database hostname, port, username,
      and password simultaneously.

    detection:
      type: regex
      patterns:
        - '(?i)(database_url|db_url|connection_string)\s*=\s*(?:postgres|mysql|mongodb|redis)://[^$\s]{8,}'
        - '(?i)(mongodb_uri|mongo_url)\s*=\s*mongodb(?:\+srv)?://[^$\s]{8,}'
      apply_to: ["env", "yaml", "json"]

    exclusions:
      - pattern: '(?i)://\$\{'
      - pattern: '(?i)://localhost\s*$'
      - pattern: '(?i)://<'

    risk_profile:
      base_severity: 8.2
      exploitability: 0.80
      impact_confidentiality: high
      impact_integrity: high
      impact_availability: medium
      likelihood_mean: 0.70
      likelihood_std: 0.12
      distribution_type: beta

    nist_function: PROTECT
    nist_category: PR.AC-1
    cwe_id: CWE-522
    owasp_category: A07:2021

    remediation:
      hint: "Break the connection string into separate environment variables."
      template_id: CRED-FIX-003
      example_fix: "DATABASE_URL=${DATABASE_URL}"

    test_cases:
      should_match:
        - "DATABASE_URL=postgres://admin:password@db.example.com:5432/mydb"
        - "MONGODB_URI=mongodb://user:pass@cluster.mongodb.net/mydb"
      should_not_match:
        - "DATABASE_URL=${DATABASE_URL}"

  # ────────────────────────────────────────────────────────
  - id: CRED-004
    name: "Weak or Default Secret Key"
    category: credentials
    severity: high
    cvss_score: 7.5

    description: >
      The application secret key is set to a weak, default, or easily guessable
      value. Secret keys are used for signing tokens and sessions; weak keys
      make these trivially forgeable.

    detection:
      type: regex
      patterns:
        - '(?i)(secret_key|app_secret|jwt_secret)\s*=\s*(?i)(secret|mysecret|changeme|default|12345|password|admin|test|dev)'
        - '(?i)(secret_key|app_secret)\s*=\s*[a-zA-Z0-9]{1,15}$'
      apply_to: ["env", "yaml", "json"]

    exclusions:
      - pattern: '(?i)=\s*\$\{'
      - pattern: '(?i)=\s*<'

    risk_profile:
      base_severity: 7.5
      exploitability: 0.75
      impact_confidentiality: high
      impact_integrity: high
      impact_availability: low
      likelihood_mean: 0.65
      likelihood_std: 0.15
      distribution_type: beta

    nist_function: PROTECT
    nist_category: PR.AC-3
    cwe_id: CWE-521
    owasp_category: A07:2021

    remediation:
      hint: "Generate a strong random secret key of at least 32 characters."
      template_id: CRED-FIX-004
      example_fix: "SECRET_KEY=${SECRET_KEY}  # generate with: python -c \"import secrets; print(secrets.token_hex(32))\""

    test_cases:
      should_match:
        - "SECRET_KEY=mysecret"
        - "JWT_SECRET=changeme"
        - "APP_SECRET=12345"
      should_not_match:
        - "SECRET_KEY=${SECRET_KEY}"

  # ────────────────────────────────────────────────────────
  - id: CRED-005
    name: "Hard-coded Token or Bearer Credential"
    category: credentials
    severity: high
    cvss_score: 8.0

    description: >
      An authentication token, bearer token, or access token is hard-coded
      in the configuration file. Tokens often grant broad access and may
      not expire, making their exposure particularly dangerous.

    detection:
      type: regex
      patterns:
        - '(?i)(token|auth_token|bearer_token|access_token)\s*=\s*(?!\$\{)(?!<)[a-zA-Z0-9_\.\-]{20,}'
        - '(?i)(github_token|gitlab_token|npm_token)\s*=\s*(?!\$\{)[a-zA-Z0-9_]{20,}'
      apply_to: ["env", "yaml", "json"]

    exclusions:
      - pattern: '(?i)=\s*\$\{'
      - pattern: '(?i)=\s*<'
      - pattern: '(?i)=\s*""'

    risk_profile:
      base_severity: 8.0
      exploitability: 0.80
      impact_confidentiality: high
      impact_integrity: medium
      impact_availability: low
      likelihood_mean: 0.70
      likelihood_std: 0.12
      distribution_type: beta

    nist_function: PROTECT
    nist_category: PR.AC-1
    cwe_id: CWE-798
    owasp_category: A07:2021

    remediation:
      hint: "Move tokens to environment variables or a secrets manager."
      template_id: CRED-FIX-005
      example_fix: "GITHUB_TOKEN=${GITHUB_TOKEN}"

    test_cases:
      should_match:
        - "GITHUB_TOKEN=ghp_abcdefghijklmnopqrstuvwxyz1234"
        - "ACCESS_TOKEN=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9"
      should_not_match:
        - "GITHUB_TOKEN=${GITHUB_TOKEN}"
