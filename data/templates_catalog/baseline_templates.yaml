# ============================================================
# Baseline Security Fix Templates
# Maps to rules: BASE-001 to BASE-005
# ============================================================

templates:

  - id: BASE-FIX-001
    name: "Disable Debug Mode in Production"
    category: baseline
    applies_to:
      - BASE-001

    fix_strategy: configuration_change

    fix_template: "{{original_key}}=false"

    variables:
      - name: original_key
        type: string
        description: "The debug mode config key"

    explanation: >
      Debug mode has been disabled. Running with DEBUG=true in production exposes
      detailed error messages, stack traces, and internal application state to users,
      which attackers can use to identify vulnerabilities. Always disable debug mode
      before deploying to any environment accessible outside your development machine.

    metadata:
      auto_fixable: true
      fix_confidence: 0.98
      priority: immediate
      effort: low

    side_effects:
      - "Generic error pages will be shown to users instead of detailed tracebacks."
      - "Ensure your application handles errors gracefully for end users."

    breaking_change: false

    validation:
      - type: regex
        pattern: '=false'
        description: "Debug mode must be false"

    test_cases:
      - input:
          original_key: "DEBUG"
          original_value: "true"
        expected_output: "DEBUG=false"

  - id: BASE-FIX-002
    name: "Set Secure Environment Mode"
    category: baseline
    applies_to:
      - BASE-002

    fix_strategy: configuration_change

    fix_template: "{{original_key}}=production"

    variables:
      - name: original_key
        type: string
        description: "The environment/mode config key"

    explanation: >
      The environment has been set to 'production'. Running with APP_ENV=development
      or APP_ENV=test often enables extra logging, disables security checks, and
      exposes debugging endpoints. Always explicitly set your environment to 'production'
      to ensure all security hardening is active.

    metadata:
      auto_fixable: true
      fix_confidence: 0.95
      priority: high
      effort: low

    side_effects:
      - "Verify that production mode does not disable features your application requires."

    breaking_change: false

    validation:
      - type: regex
        pattern: '=production'
        description: "Environment must be set to production"

    test_cases:
      - input:
          original_key: "APP_ENV"
          original_value: "development"
        expected_output: "APP_ENV=production"

  - id: BASE-FIX-003
    name: "Set Strong Content Security Policy"
    category: baseline
    applies_to:
      - BASE-003

    fix_strategy: configuration_change

    fix_template: "{{original_key}}=default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:"

    variables:
      - name: original_key
        type: string
        description: "The CSP config key"

    explanation: >
      The Content Security Policy has been tightened from 'unsafe-inline' or wildcard
      to a restrictive default. CSP prevents XSS attacks by controlling which resources
      browsers are allowed to load. Start with 'default-src self' and progressively
      allow only the specific sources your application requires.

    metadata:
      auto_fixable: false
      fix_confidence: 0.70
      priority: medium
      effort: high

    side_effects:
      - "A restrictive CSP may break existing inline scripts and styles — audit your frontend code first."
      - "Use Content-Security-Policy-Report-Only header to test before enforcing."

    breaking_change: true

    validation:
      - type: regex
        pattern: "default-src"
        description: "CSP must include a default-src directive"

    test_cases:
      - input:
          original_key: "CONTENT_SECURITY_POLICY"
          original_value: "unsafe-inline"
        expected_output: "CONTENT_SECURITY_POLICY=default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:"

  - id: BASE-FIX-004
    name: "Enable Security Headers"
    category: baseline
    applies_to:
      - BASE-004

    fix_strategy: configuration_change

    fix_template: "{{original_key}}=true"

    variables:
      - name: original_key
        type: string
        description: "The security headers config key"

    explanation: >
      Security headers (X-Frame-Options, X-Content-Type-Options, HSTS, etc.) have
      been enabled. These HTTP response headers defend against common web attacks:
      clickjacking, MIME type sniffing, and protocol downgrade attacks.
      They are a low-effort, high-impact security baseline.

    metadata:
      auto_fixable: true
      fix_confidence: 0.90
      priority: medium
      effort: low

    side_effects:
      - "HSTS (Strict-Transport-Security) will prevent HTTP fallback — ensure HTTPS is stable first."

    breaking_change: false

    validation:
      - type: regex
        pattern: '=true'
        description: "Security headers must be enabled"

    test_cases:
      - input:
          original_key: "SECURITY_HEADERS_ENABLED"
          original_value: "false"
        expected_output: "SECURITY_HEADERS_ENABLED=true"

  - id: BASE-FIX-005
    name: "Remove Exposed Internal Endpoint"
    category: baseline
    applies_to:
      - BASE-005

    fix_strategy: manual_guidance

    fix_template: "# {{original_key}} — move to environment variable and restrict access\n{{original_key}}=${{{original_key}}}"

    variables:
      - name: original_key
        type: string
        description: "The internal endpoint config key"

    explanation: >
      The internal or admin endpoint URL has been flagged for review. Exposed internal
      endpoints (admin panels, metrics, health checks) should be restricted to internal
      networks or require authentication. Use environment variables for URLs and implement
      IP allowlisting or authentication middleware to protect these endpoints.

    metadata:
      auto_fixable: false
      fix_confidence: 0.75
      priority: medium
      effort: medium

    side_effects:
      - "Restricting the endpoint may require network configuration changes."
      - "Ensure monitoring/alerting systems can still reach health check endpoints."

    breaking_change: false

    validation:
      - type: regex
        pattern: '=\$\{'
        description: "Endpoint must be configurable via environment variable"

    test_cases:
      - input:
          original_key: "ADMIN_URL"
          original_value: "http://0.0.0.0:8080/admin"
        expected_output: "# ADMIN_URL — move to environment variable and restrict access\nADMIN_URL=${ADMIN_URL}"
