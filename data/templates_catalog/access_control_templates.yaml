templates:

  - id: AC-FIX-001
    name: "Restrictive CORS Origin"
    category: access_control
    applies_to:
      - AC-001
    fix_strategy: configuration_change
    description: "Replace wildcard CORS origin with specific allowed origins"
    fix_template: "{original_key}=${{{env_var_name}}}"
    variables:
      - name: env_var_name
        type: string
        default: "ALLOWED_ORIGINS"
        description: "Environment variable containing comma-separated allowed origins"
    explanation: |
      CORS wildcard (*) allows any origin to make cross-origin requests,
      enabling cross-site request forgery and data theft. Replace with an
      explicit list of trusted origins stored as an environment variable.
    metadata:
      auto_fixable: true
      fix_confidence: 0.85
      priority: high
      effort: medium
    side_effects:
      - "Define ALLOWED_ORIGINS with specific trusted domains"
      - "Test all frontend applications to confirm they are included"
      - "Update the variable when new trusted origins are added"
    breaking_change: true
    validation:
      - type: not_contains
        value: "*"
        description: "Must not use wildcard (*) for CORS origin"
    test_cases:
      - input:
          original_key: "CORS_ORIGIN"
          original_value: "*"
          env_var_name: "ALLOWED_ORIGINS"
        expected_output: "CORS_ORIGIN=${ALLOWED_ORIGINS}"

  - id: AC-FIX-002
    name: "Debug Mode Disable"
    category: access_control
    applies_to:
      - AC-002
    fix_strategy: configuration_change
    description: "Disable debug mode in production configuration"
    fix_template: "{original_key}=false"
    variables: []
    explanation: |
      Debug mode exposes stack traces, internal configuration, and detailed
      error messages to end users, providing attackers with valuable
      reconnaissance information. Always disable debug mode in production.
    metadata:
      auto_fixable: true
      fix_confidence: 0.98
      priority: high
      effort: low
    side_effects:
      - "Ensure proper error logging is configured separately"
      - "Verify application behaves correctly without debug output"
    breaking_change: false
    validation:
      - type: regex
        pattern: '^(false|False|FALSE|0|no|No)$'
        description: "Debug mode must be disabled (false/0)"
    test_cases:
      - input:
          original_key: "DEBUG"
          original_value: "true"
        expected_output: "DEBUG=false"
      - input:
          original_key: "APP_DEBUG"
          original_value: "1"
        expected_output: "APP_DEBUG=false"

  - id: AC-FIX-003
    name: "Permissive File Permission Restriction"
    category: access_control
    applies_to:
      - AC-003
    fix_strategy: configuration_change
    description: "Replace world-writable/readable file permissions with restrictive values"
    fix_template: "{original_key}=0640"
    variables:
      - name: permission_value
        type: string
        default: "0640"
        description: "Restrictive permission value (owner read/write, group read only)"
    explanation: |
      World-readable or world-writable file permissions (0777, 0666, 0644 for
      sensitive files) allow unauthorized users to read or modify critical files.
      Use 0640 (owner rw, group r) or stricter for configuration files.
    metadata:
      auto_fixable: true
      fix_confidence: 0.85
      priority: medium
      effort: low
    side_effects:
      - "Verify the application process user has appropriate access"
      - "Check group membership is correctly configured"
    breaking_change: false
    validation:
      - type: regex
        pattern: '^0[46][04]0$'
        description: "Permission must be restrictive (0640, 0600, or 0400)"
    test_cases:
      - input:
          original_key: "FILE_PERMISSIONS"
          original_value: "0777"
        expected_output: "FILE_PERMISSIONS=0640"

  - id: AC-FIX-004
    name: "Admin Interface Binding Restriction"
    category: access_control
    applies_to:
      - AC-004
    fix_strategy: configuration_change
    description: "Bind admin interface to localhost instead of all interfaces"
    fix_template: "{original_key}=127.0.0.1"
    variables: []
    explanation: |
      Binding admin interfaces to 0.0.0.0 exposes them on all network interfaces,
      making them accessible from external networks. Restrict to 127.0.0.1
      (localhost) and use a VPN or SSH tunnel for remote administration.
    metadata:
      auto_fixable: true
      fix_confidence: 0.90
      priority: high
      effort: low
    side_effects:
      - "Remote admin access will require VPN or SSH tunnel"
      - "Notify administrators of the access method change"
    breaking_change: true
    validation:
      - type: not_contains
        value: "0.0.0.0"
        description: "Must not bind to all interfaces"
    test_cases:
      - input:
          original_key: "ADMIN_HOST"
          original_value: "0.0.0.0"
        expected_output: "ADMIN_HOST=127.0.0.1"

  - id: AC-FIX-005
    name: "Insecure HTTP to HTTPS"
    category: access_control
    applies_to:
      - AC-005
    fix_strategy: configuration_change
    description: "Replace HTTP with HTTPS for all URL configurations"
    fix_template: "{original_key}={https_url}"
    variables:
      - name: https_url
        type: string
        default: "{original_value_with_https}"
        description: "The URL with http:// replaced by https://"
    explanation: |
      Using HTTP instead of HTTPS transmits data in plain text, exposing it to
      interception. All URLs in configuration should use HTTPS to ensure
      data is encrypted in transit.
    metadata:
      auto_fixable: true
      fix_confidence: 0.88
      priority: high
      effort: low
    side_effects:
      - "Ensure the target server has a valid SSL certificate"
      - "Update firewall rules if port 443 is not already open"
    breaking_change: false
    validation:
      - type: regex
        pattern: 'https://'
        description: "URL must use HTTPS protocol"
    test_cases:
      - input:
          original_key: "API_URL"
          original_value: "http://api.example.com"
        expected_output: "API_URL=https://api.example.com"
